<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>这是我的个⼈OJ系统</title>
    <style>
        /* 起⼿式, 100%保证我们的样式设置可以不受默认影响 */
        * {
            /* 消除⽹⻚的默认外边距 */
            margin: 0px;
            /* 消除⽹⻚的默认内边距 */
            padding: 0px;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        .container .navbar {
            width: 100%;
            height: 50px;
            background-color: black;
            /* 给⽗级标签设置overflow，取消后续float带来的影响 */
            overflow: hidden;
        }

        .container .navbar a {
            /* 设置a标签是⾏内块元素，允许你设置宽度 */
            display: inline-block;
            /* 设置a标签的宽度,a标签默认⾏内元素，⽆法设置宽度 */
            width: 80px;
            /* 设置字体颜⾊ */
            color: white;
            /* 设置字体的⼤⼩ */
            font-size: large;
            /* 设置⽂字的⾼度和导航栏⼀样的⾼度 */
            line-height: 50px;
            /* 去掉a标签的下划线 */
            text-decoration: none;
            /* 设置a标签中的⽂字居中 */
            text-align: center;
        }

        /* 设置⿏标事件 */
        .container .navbar a:hover {
            background-color: green;
        }

        .container .navbar .login {
            float: right;
        }

        .container .content {
            /* 设置标签的宽度 */
            width: 800px;
            /* ⽤来调试 */
            /* background-color: #ccc; */
            /* 整体居中 */
            margin: 0px auto;
            /* 设置⽂字居中 */
            text-align: center;
            /* 设置上外边距 */
            margin-top: 200px;
        }

        .container .content .font_ {
            /* 设置标签为块级元素，独占⼀⾏，可以设置⾼度宽度等属性 */
            display: block;
            /* 设置每个⽂字的上外边距 */
            margin-top: 20px;
            /* 去掉a标签的下划线 */
            text-decoration: none;
            /* 设置字体⼤⼩
font-size: larger; */
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 导航栏， 功能不实现-->
        <div class="navbar">
            <a href="#">⾸⻚</a>
            <a href="/all_questions">题库</a>
            <a href="#">竞赛</a>
            <a href="#">讨论</a>
            <a href="#">求职</a>
            <a class="login" href="#">登录</a>
        </div>
        <!-- ⽹⻚的内容 -->
        <div class="content">
            <h1 class="font_">欢迎来到我的OnlineJudge平台</h1>
            <p class="font_">这个我个⼈独⽴开发的⼀个在线OJ平台</p>
            <a class="font_" href="/all_questions">点击我开始编程啦!</a>
        </div>
    </div>
</body>

</html>
